<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">

        <h2>luxe closet</h2>

        <div class="login-box">
            <h2>Login To Your Account</h2>
         <div class="soc-log"><button class="btn-soc">Login with Google</button></div>
         <div class="or">OR</div>

         <form action="" id="log-form">
            <div class="input-det">
                <input type="email" name="email" placeholder="***@gmail.com" required>
            </div>
            <div class="input-det">
                <input type="password" name="password" placeholder="Password..." required>
            </div>

            <div class="captcha-container">
          <div class="captcha-box">
            <input type="checkbox" id="not-robot">
            <label for="not-robot">I'm not a robot</label>
          </div>
          <img src="" alt="recaptcha" class="recaptcha-logo">

        </div>

        <button type="submit" class="btn-submit">Login →</button>

         </form>

         <div class="footer-links">
        <a href="#">Create account</a> • <a href="#">Forgot password</a>
      </div>
      
        </div>
    </div>
</body>
</html>
